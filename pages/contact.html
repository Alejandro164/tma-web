<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Inicie la optimización de su cadena de suministro con nosotros. Contáctenos para operaciones críticas.">

    <meta name="author" content="ITEK TMA Alliance">
    <meta name="robots" content="index, follow">

    <title>Contacto | ITEK TMA Supply Chain Integration</title>

    <link rel="canonical" href="https://www.itektma.com/" />
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.itektma.com/">
    <meta property="og:title" content="ITEK TMA Supply Chain Integration">
    <meta property="og:description" content="Sinergia operativa y técnica para su cadena de suministro. Soluciones logísticas de clase mundial desde Costa Rica.">
    <meta property="og:image" content="https://www.itektma.com/assets/logo.jpg">
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://www.itektma.com/">
    <meta property="twitter:title" content="ITEK TMA Supply Chain Integration">
    <meta property="twitter:description" content="Sinergia operativa y técnica para su cadena de suministro. Soluciones logísticas de clase mundial desde Costa Rica.">
    <meta property="twitter:image" content="https://www.itektma.com/assets/logo.jpg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/components.css">
</head>

<body>
    <div id="navbar-module"></div>
    <main>
        <section id="contact" class="contact section-padding bg-primary">
            <div class="container contact-container">
                <div class="contact-info reveal">
                    <h2 data-i18n="contact_title" class="section-title white">Inicie la Optimización de su Cadena de Suministro</h2>
                    <p data-i18n="contact_desc" style="color: rgba(255,255,255,0.85); font-size: 1.1rem; margin-bottom: 30px;">Hablemos sobre cómo ITEK y TMA pueden integrar y fortalecer su logística de operaciones críticas.</p>
                    
                    <div class="contact-details">
                        <div class="detail-item" style="display: flex; align-items: center; gap: 12px; margin-bottom: 12px;">
                            <svg viewBox="0 0 24 24" fill="none" stroke="var(--c-accent)" stroke-width="2" width="24" height="24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                            <span data-i18n="contact_wp" style="color: white; font-weight: 600;">WhatsApp Corporativo: +506 8000-ITEK</span>
                        </div>
                        <div class="detail-item mt-3" style="display: flex; align-items: center; gap: 12px;">
                            <svg viewBox="0 0 24 24" fill="none" stroke="var(--c-accent)" stroke-width="2" width="24" height="24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                            <span style="color: white; font-weight: 600;">supplychain@itektma.com</span>
                        </div>
                    </div>
                </div>
                
                <div class="contact-form-wrapper reveal delay-2" style="flex: 1; background: var(--c-white); padding: 40px; border-radius: 8px; box-shadow: var(--shadow-lg);">
                    <form class="contact-form">
                        <div class="form-group" style="margin-bottom: 20px;">
                            <input type="text" data-i18n-prop="placeholder" data-i18n="form_company" placeholder="Empresa" required style="width: 100%; padding: 15px; border: 1px solid var(--c-gray-200); border-radius: 4px; font-family: var(--font-sans); color: var(--c-text-dark);">
                        </div>
                        <div class="form-group" style="margin-bottom: 20px;">
                            <input type="text" data-i18n-prop="placeholder" data-i18n="form_name" placeholder="Nombre completo" required style="width: 100%; padding: 15px; border: 1px solid var(--c-gray-200); border-radius: 4px; font-family: var(--font-sans); color: var(--c-text-dark);">
                        </div>
                        <div class="form-group" style="margin-bottom: 20px;">
                            <input type="email" data-i18n-prop="placeholder" data-i18n="form_email" placeholder="Correo corporativo" required style="width: 100%; padding: 15px; border: 1px solid var(--c-gray-200); border-radius: 4px; font-family: var(--font-sans); color: var(--c-text-dark);">
                        </div>
                        <div class="form-group" style="margin-bottom: 20px;">
                            <textarea data-i18n-prop="placeholder" data-i18n="form_msg" placeholder="Necesidad logística / Comentarios" rows="4" required style="width: 100%; padding: 15px; border: 1px solid var(--c-gray-200); border-radius: 4px; font-family: var(--font-sans); color: var(--c-text-dark);"></textarea>
                        </div>
                        <button type="button" class="btn btn-accent w-100" data-i18n="form_btn" style="width: 100%; display: block; text-align: center;">Enviar Solicitud B2B</button>
                    </form>
                </div>
            </div>
        </section>
    </main>
    <div id="footer-module"></div>

    <script defer src="../js/i18n.js"></script>
    <script type="module" defer src="../js/app.js"></script>
</body>
</html>
